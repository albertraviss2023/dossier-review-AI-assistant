<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Knowledge Wiki & Graph</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --accent: #38bdf8;
      --accent-gradient: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
      --border: rgba(255,255,255,0.1);
    }
    body {
      margin: 0;
      font-family: "Inter", -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    header {
      padding: 1rem 2rem;
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
    }
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .sidebar {
      width: 400px;
      background: var(--card-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      overflow-y: auto;
      box-shadow: 10px 0 30px rgba(0,0,0,0.3);
    }
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      overflow-y: auto;
      gap: 1.5rem;
      background: radial-gradient(circle at top right, #1e293b, #0f172a);
    }
    .graph-container {
      height: 500px;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--border);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }
    .search-box {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    input {
      padding: 0.85rem;
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: var(--accent);
    }
    button {
      padding: 0.85rem;
      background: var(--accent-gradient);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4);
    }
    .viz-card {
      background: var(--card-bg);
      padding: 1.5rem;
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.25rem;
      margin-bottom: 0.5rem;
    }
    .stat-item {
      padding: 1.25rem;
      background: rgba(15, 23, 42, 0.4);
      border-radius: 12px;
      text-align: center;
      border: 1px solid var(--border);
      transition: transform 0.3s;
    }
    .stat-item:hover {
      transform: scale(1.02);
      border-color: var(--accent);
    }
    .stat-value {
      font-size: 1.75rem;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #cy {
      width: 100%;
      height: 100%;
    }
    h3 {
      margin-top: 0;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 1.5px;
      margin-bottom: 1.25rem;
    }
    .ai-bubble {
      background: rgba(56, 189, 248, 0.1);
      border-left: 4px solid var(--accent);
      padding: 1rem;
      border-radius: 0 12px 12px 0;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <header>
    <div style="display:flex;align-items:center;gap:1rem;">
      <img src="/brand-mark.svg" height="32" style="filter: drop-shadow(0 0 8px var(--accent));" />
      <h2 style="margin:0; font-weight: 800; letter-spacing: -0.5px;">ANALYST WIKI</h2>
    </div>
    <nav><a href="/review?surface=wiki" style="color:var(--accent);text-decoration:none; font-weight: 600; border: 1px solid var(--accent); padding: 0.5rem 1rem; border-radius: 8px;">Dossier Review</a></nav>
  </header>

  <div class="main-container">
    <div class="sidebar">
      <h3>Natural Language Insights</h3>
      <div class="search-box">
        <input type="text" id="nlQuery" placeholder="Try: 'Show approval trends this month'" />
        <button onclick="askAssistant()">GENERATE ANALYSIS</button>
      </div>
      <div id="aiResponse">
        <p style="color:#64748b; font-style: italic;">Ask a question to see system-wide trends and generated insights.</p>
      </div>
      <div id="plotContainer" style="height: 400px; margin-top: 1rem;"></div>
    </div>

    <div class="content-area">
      <div class="viz-card">
        <h3>Knowledge Graph Explorer</h3>
        <div class="graph-container">
          <div id="cy"></div>
        </div>
      </div>

      <div class="viz-card">
        <h3>Global Metrics</h3>
        <div id="statsGrid" class="stats-grid">
          <div class="stat-item">Initializing metrics...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const fancyColors = [
      '#38bdf8', '#818cf8', '#fb7185', '#34d399', '#fbbf24', 
      '#a78bfa', '#f472b6', '#2dd4bf', '#fb923c', '#94a3b8'
    ];

    async function init() {
      const resp = await fetch('/v1/knowledge-graph');
      const data = await resp.json();
      
      renderGraph(data);
      renderStats(data.summary_stats);
    }

    function renderGraph(data) {
      const elements = [];
      data.nodes.forEach(n => {
        elements.push({ 
          data: { 
            id: n.id, 
            label: n.properties.name || n.properties.recommendation || n.id, 
            type: n.type 
          } 
        });
      });
      data.edges.forEach(e => {
        elements.push({ data: { source: e.source, target: e.target, label: e.type } });
      });

      cytoscape({
        container: document.getElementById('cy'),
        elements: elements,
        style: [
          {
            selector: 'node',
            style: {
              'label': 'data(label)',
              'background-color': '#475569',
              'color': '#f8fafc',
              'font-size': '10px',
              'font-family': 'Inter',
              'text-valign': 'center',
              'text-halign': 'center',
              'width': 40,
              'height': 40,
              'text-wrap': 'wrap',
              'text-max-width': 80
            }
          },
          {
            selector: 'node[type="Dossier"]',
            style: { 
              'background-color': '#38bdf8',
              'shape': 'diamond'
            }
          },
          {
            selector: 'node[type="Product"]',
            style: { 'background-color': '#818cf8' }
          },
          {
            selector: 'node[type="Violation"]',
            style: { 
              'background-color': '#fb7185',
              'shape': 'octagon'
            }
          },
          {
            selector: 'node[type="AMRCategory"]',
            style: { 'background-color': '#34d399' }
          },
          {
            selector: 'edge',
            style: {
              'width': 2,
              'line-color': 'rgba(248, 250, 252, 0.1)',
              'target-arrow-color': 'rgba(248, 250, 252, 0.2)',
              'target-arrow-shape': 'triangle',
              'curve-style': 'bezier',
              'font-size': '8px',
              'label': 'data(label)',
              'color': '#94a3b8',
              'text-background-opacity': 1,
              'text-background-color': '#1e293b',
              'text-background-padding': '2px'
            }
          }
        ],
        layout: { 
          name: 'cose', 
          padding: 30,
          nodeRepulsion: 4000,
          idealEdgeLength: 100
        }
      });
    }

    function renderStats(stats) {
      const grid = document.getElementById('statsGrid');
      grid.innerHTML = `
        <div class="stat-item">
          <div style="font-size:0.75rem;color:#94a3b8;margin-bottom:0.5rem;">TOTAL SUBMISSIONS</div>
          <div class="stat-value">${stats.total_dossiers}</div>
        </div>
        <div class="stat-item">
          <div style="font-size:0.75rem;color:#94a3b8;margin-bottom:0.5rem;">APPROVED</div>
          <div class="stat-value">${stats.recommendations.approve || 0}</div>
        </div>
        <div class="stat-item">
          <div style="font-size:0.75rem;color:#94a3b8;margin-bottom:0.5rem;">REJECTED</div>
          <div class="stat-value" style="background: linear-gradient(135deg, #fb7185 0%, #f43f5e 100%); -webkit-background-clip: text;">${stats.recommendations.reject || 0}</div>
        </div>
        <div class="stat-item">
          <div style="font-size:0.75rem;color:#94a3b8;margin-bottom:0.5rem;">AMR SIGNALS</div>
          <div class="stat-value" style="background: linear-gradient(135deg, #34d399 0%, #10b981 100%); -webkit-background-clip: text;">${Object.keys(stats.aware_categories).length}</div>
        </div>
      `;
    }

    async function askAssistant() {
      const query = document.getElementById('nlQuery').value;
      const aiResponseDiv = document.getElementById('aiResponse');
      const plotContainer = document.getElementById('plotContainer');
      
      aiResponseDiv.innerHTML = '<div class="ai-bubble">Synthesizing multi-dossier insights...</div>';
      Plotly.purge(plotContainer);

      try {
        const resp = await fetch('/v1/assistant/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            question: query,
            workspace: 'wiki',
            dossier_id: null
          })
        });
        
        const data = await resp.json();
        aiResponseDiv.innerHTML = `<div class="ai-bubble">${data.rationale.split('### Final Answer')[1]?.replace(/\n/g, '<br>') || data.rationale.replace(/\n/g, '<br>')}</div>`;
        
        if (data.visualization_data) {
          const viz = data.visualization_data;
          let plotlyData = [];
          
          if (viz.type === 'bar') {
            plotlyData = viz.datasets.map((ds, i) => ({
              x: viz.labels,
              y: ds.data,
              name: ds.label,
              type: 'bar',
              marker: { 
                color: ds.backgroundColor || fancyColors[i % fancyColors.length],
                line: { width: 1.5 }
              }
            }));
          } else if (viz.type === 'pie') {
            plotlyData = [{
              labels: viz.labels,
              values: viz.datasets[0].data,
              type: 'pie',
              hole: 0.4,
              marker: { colors: viz.datasets[0].backgroundColor || fancyColors }
            }];
          }

          const layout = {
            title: {
              text: viz.title,
              font: { color: '#f8fafc', size: 16, family: 'Inter', weight: 800 }
            },
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(0,0,0,0)',
            font: { color: '#94a3b8' },
            showlegend: true,
            legend: { font: { color: '#f8fafc' } },
            margin: { t: 60, l: 40, r: 20, b: 40 },
            xaxis: { gridcolor: 'rgba(255,255,255,0.05)', zerolinecolor: 'rgba(255,255,255,0.1)' },
            yaxis: { gridcolor: 'rgba(255,255,255,0.05)', zerolinecolor: 'rgba(255,255,255,0.1)' },
            annotations: [
              {
                text: 'Gemma 4 review — simplified insights',
                xref: 'paper',
                yref: 'paper',
                x: 0.5,
                y: 0.55,
                showarrow: false,
                font: { size: 18, color: 'rgba(248,250,252,0.85)', family: 'Inter', weight: 700 },
                align: 'center'
              },
              {
                text: 'Translucent logo at 50% opacity',
                xref: 'paper',
                yref: 'paper',
                x: 0.5,
                y: 0.46,
                showarrow: false,
                font: { size: 12, color: 'rgba(248,250,252,0.70)', family: 'Inter' },
                align: 'center'
              }
            ],
            images: [
              {
                source: '/brand-mark.svg',
                xref: 'paper',
                yref: 'paper',
                x: 0.5,
                y: 0.5,
                xanchor: 'center',
                yanchor: 'middle',
                sizex: 0.4,
                sizey: 0.4,
                opacity: 0.14,
                layer: 'above'
              }
            ]
          };

          Plotly.newPlot(plotContainer, plotlyData, layout, { responsive: true, displayModeBar: false });
        }
      } catch (err) {
        aiResponseDiv.innerHTML = `<p style="color:#fb7185;">Execution Error: ${err.message}</p>`;
      }
    }

    init();
  </script>
</body>
</html>
